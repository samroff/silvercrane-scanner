<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Silver Crane — Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a0e1a;--bg2:#111827;--text:#e2e8f0;--text2:#64748b;--accent:#1e90ff;--green:#00e676;--red:#ff5252;--amber:#ffab00;--border:#1e293b;--fd:'JetBrains Mono',monospace;--fh:'Inter',sans-serif;}
body{background:var(--bg);color:var(--text);font-family:var(--fh);min-height:100vh;padding:0;}
.header{background:var(--bg2);border-bottom:2px solid var(--accent);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:18px;font-weight:700;letter-spacing:1px;color:#fff;}
.logo span{color:var(--accent);}
.main{padding:16px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden;}
.ch{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.ct{font-size:14px;font-weight:700;letter-spacing:.5px;}
.cb{padding:16px;}
.btn{border:none;border-radius:8px;padding:10px 16px;font-family:var(--fh);font-size:13px;font-weight:700;cursor:pointer;transition:transform .1s;}
.btn:active{transform:scale(.96);}
.btn-d{background:var(--red);color:#fff;}
.btn-g{background:var(--bg);color:var(--text);border:1px solid var(--border);}
.btn-p{background:var(--accent);color:#fff;}
input.fc{width:100%;padding:14px;font-size:18px;font-family:var(--fd);background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;text-align:center;outline:none;}
input.fc:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(30,144,255,.3);}
.counter{font-family:var(--fd);font-size:64px;font-weight:800;color:var(--accent);line-height:1;}
.sub{font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-top:4px;}
.log-item{display:flex;align-items:center;gap:10px;padding:6px 10px;border-bottom:1px solid var(--border);font-family:var(--fd);font-size:12px;}
.log-item:first-child{background:rgba(30,144,255,.06);}
.toast{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg2);color:var(--text);padding:10px 20px;border-radius:8px;border-left:3px solid var(--green);font-size:13px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.4);}
</style>
</head>
<body>
<div class="header">
  <div class="logo">SILVER <span>CRANE</span></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--bg);border:1px solid var(--border);border-radius:20px;font-size:10px;letter-spacing:1px;">
      <span id="live-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--text2);transition:box-shadow .3s;"></span>
      <span id="live-label" style="color:var(--text2);font-family:var(--fd);font-weight:700;">OFFLINE</span>
    </span>
    <div style="font-size:10px;color:var(--text2);letter-spacing:1px;">SCANNER</div>
  </div>
</div>
<div class="main">
  <div class="card">
    <div class="ch" style="border-left:3px solid var(--accent);">
      <div class="ct">SCAN</div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-d" onclick="resetScan()">RESET</button>
        <button class="btn btn-g" onclick="exportScan()">EXPORT</button>
      </div>
    </div>
    <div class="cb" style="text-align:center;">
      <div style="margin-bottom:12px;font-size:11px;color:var(--text2);">Tap below then scan with your Zebra TC21</div>
      <input type="text" class="fc" id="scan-input" placeholder="Tap here, then scan..." autocomplete="off" inputmode="none" onkeydown="onScanKey(event)">
      <div id="scan-display" style="margin-top:20px;"></div>
    </div>
  </div>
  <div class="card">
    <div class="ch"><div class="ct">SCAN LOG</div><span id="log-count" style="font-size:11px;color:var(--text2);font-family:var(--fd);"></span></div>
    <div class="cb" id="scan-log" style="max-height:300px;overflow-y:auto;padding:0;"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const data={barcodes:{},log:[]};

// ---- Supabase live link ----
const SB_URL='https://wbkmfccsxsubtbugzcvr.supabase.co';
const SB_KEY='sb_publishable_vQPPO8xRtEVTjFhjmURGQA_4SQR2BW6';
let sbClient=null, sbChannel=null, sbReady=false;
function initLive(){
  try{
    if(typeof supabase==='undefined'||!supabase.createClient)return;
    sbClient=supabase.createClient(SB_URL,SB_KEY);
    sbChannel=sbClient.channel('silvercrane-scanner',{config:{broadcast:{self:false}}});
    sbChannel.subscribe(status=>{
      sbReady=(status==='SUBSCRIBED');
      const dot=document.getElementById('live-dot');
      const lbl=document.getElementById('live-label');
      if(dot)dot.style.background=sbReady?'var(--green)':'var(--text2)';
      if(lbl)lbl.textContent=sbReady?'LIVE':'OFFLINE';
    });
  }catch(e){console.warn('live init failed',e);}
}
function flashLive(){
  const dot=document.getElementById('live-dot');if(!dot)return;
  dot.style.boxShadow='0 0 0 6px rgba(0,230,118,.35)';
  setTimeout(()=>{dot.style.boxShadow='none';},400);
}
function broadcastScan(code){
  if(!sbReady||!sbChannel)return;
  try{sbChannel.send({type:'broadcast',event:'scan',payload:{code,time:new Date().toISOString()}});}catch(_){}
}
function broadcastReset(){
  if(!sbReady||!sbChannel)return;
  try{sbChannel.send({type:'broadcast',event:'reset',payload:{}});}catch(_){}
}

function onScanKey(e){
  if(e.key==='Enter'){
    e.preventDefault();
    const inp=document.getElementById('scan-input');
    const code=(inp.value||'').trim();
    if(code)processScan(code);
    inp.value='';
  }
}

function processScan(code){
  if(!data.barcodes[code])data.barcodes[code]={count:0,first:null,last:null};
  data.barcodes[code].count++;
  const now=new Date().toISOString();
  data.barcodes[code].last=now;
  if(!data.barcodes[code].first)data.barcodes[code].first=now;
  data.log.push({code,time:now});
  updateDisplay();
  beep();
  broadcastScan(code);
  flashLive();
}

function beep(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator();const g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.frequency.value=1200;g.gain.value=0.15;
    o.start();o.stop(ac.currentTime+0.08);
  }catch(e){}
}

function updateDisplay(){
  const display=document.getElementById('scan-display');
  const logEl=document.getElementById('scan-log');
  const countEl=document.getElementById('log-count');
  const codes=Object.entries(data.barcodes);
  const total=codes.reduce((a,[,v])=>a+v.count,0);
  const unique=codes.length;

  if(!total){
    display.innerHTML='<div style="padding:30px;opacity:.3;font-size:40px;">📦</div><div style="color:var(--text2);font-size:12px;">No scans yet</div>';
    logEl.innerHTML='';
    countEl.textContent='';
    return;
  }

  let html='<div style="display:flex;justify-content:center;gap:16px;margin-bottom:16px;">';
  html+='<div style="background:var(--bg);border:2px solid var(--accent);border-radius:14px;padding:14px 24px;min-width:120px;"><div class="counter">'+total+'</div><div class="sub">Total Scans</div></div>';
  html+='<div style="background:var(--bg);border:2px solid #00bcd4;border-radius:14px;padding:14px 24px;min-width:120px;"><div class="counter" style="color:#00bcd4;">'+unique+'</div><div class="sub">Unique</div></div>';
  html+='</div>';

  codes.sort((a,b)=>b[1].count-a[1].count).forEach(([code,d])=>{
    const t=d.last?new Date(d.last).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'';
    html+='<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;">';
    html+='<div style="font-family:var(--fd);font-size:28px;font-weight:800;color:var(--accent);min-width:50px;text-align:center;">'+d.count+'</div>';
    html+='<div style="flex:1;text-align:left;"><div style="font-family:var(--fd);font-size:11px;font-weight:600;word-break:break-all;">'+code+'</div><div style="font-size:9px;color:var(--text2);">Last: '+t+'</div></div>';
    html+='</div>';
  });

  display.innerHTML=html;

  const recent=[...data.log].reverse().slice(0,30);
  logEl.innerHTML=recent.map((s,i)=>{
    const t=new Date(s.time).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const num=data.log.length-i;
    return '<div class="log-item"><span style="color:var(--text2);min-width:30px;">#'+num+'</span><span style="color:var(--accent);font-weight:600;flex:1;">'+s.code+'</span><span style="color:var(--text2);">'+t+'</span></div>';
  }).join('');

  countEl.textContent=total+' scans';
}

function resetScan(){
  if(data.log.length&&!confirm('Reset all scan data?'))return;
  data.barcodes={};data.log=[];
  updateDisplay();
  broadcastReset();
  toast('Reset','green');
}

function exportScan(){
  if(!data.log.length){toast('No scans','amber');return;}
  const lines=['Barcode,Count,First Scan,Last Scan'];
  Object.entries(data.barcodes).forEach(([code,d])=>{
    lines.push(code+','+d.count+','+(d.first||'')+','+(d.last||''));
  });
  lines.push('','Scan Log','#,Barcode,Time');
  data.log.forEach((s,i)=>{lines.push((i+1)+','+s.code+','+s.time);});
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='scan_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('Exported','green');
}

function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.borderLeftColor=type==='red'?'var(--red)':type==='amber'?'var(--amber)':'var(--green)';
  t.style.display='block';
  setTimeout(()=>t.style.display='none',2000);
}

// Auto-focus on load
window.addEventListener('load',()=>{
  document.getElementById('scan-input').focus();
  updateDisplay();
  initLive();
});
// Re-focus when tapping anywhere (scanner might lose focus)
document.addEventListener('click',()=>{
  setTimeout(()=>document.getElementById('scan-input').focus(),50);
});
</script>
</body>
</html>
